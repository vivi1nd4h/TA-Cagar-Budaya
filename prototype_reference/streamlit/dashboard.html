    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));

    const templateEl = document.querySelector('script[type="__bundler/template"]');

    const entryId = templateData.entry;

    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {

        const bytes = new Uint8Array(binaryStr.length);

      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {

      }

    }

    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).

    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }

      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });

      var gen = ++navGen;

        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.

        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}

        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);

        else cw.scrollTo(0, 0);

b { background: #cfc6b6; border-radius: 6px; }\n  ::-webkit-scrollbar-track { background: transparent; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n\n\n<div style=\"min-height:100vh; background:#EFEBE2; color:#1E1B16; padding:0 0 64px;\">\n\n  <!-- ===== HEADER ===== -->\n  <header style=\"max-width:1240px; margin:0 auto; padding:34px 36px 20px;\">\n    <div style=\"display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:16px;\">\n      <div style=\"max-width:100%;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:#9A6A2F; margin-bottom:12px;\">Bab IV · Integrasi Topic Modeling · Sentimen · SNA<\u002Fdiv>\n        <h1 style=\"font-family:'Spectral',serif; font-weight:600; font-size:40px; line-height:1.08; margin:0; letter-spacing:-.01em;\">Ekosistem Pengalaman Publik Cagar Budaya Surabaya<\u002Fh1>\n        <p style=\"font-size:15.5px; line-height:1.6; color:#5C5346; margin:14px 0 0; max-width:920px;\">Dashboard naratif yang membaca <strong style=\"color:#1E1B16; font-weight:600;\">27 objek cagar budaya<\u002Fstrong> bukan sebagai situs yang berdiri sendiri, melainkan sebagai simpul yang saling terhubung — lewat apa yang dibicarakan pengunjung, bagaimana mereka menilainya, dan bagaimana objek terjalin dalam jaringan ko-reviewer.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ===== TAB NAV ===== -->\n  <nav style=\"max-width:1240px; margin:18px auto 0; padding:0 36px; border-bottom:1px solid #DAD2C4; display:flex; gap:4px;\">\n    <button onclick=\"{{ goOverview }}\" style=\"{{ tabStyle.overview }}\">Ringkasan<\u002Fbutton>\n    <button onclick=\"{{ goJaringan }}\" style=\"{{ tabStyle.jaringan }}\">Jaringan Ko-Reviewer<\u002Fbutton>\n    <button onclick=\"{{ goTopik }}\" style=\"{{ tabStyle.topik }}\">Topik &amp; Sentimen<\u002Fbutton>\n    <button onclick=\"{{ goPrioritas }}\" style=\"{{ tabStyle.prioritas }}\">Prioritas Objek<\u002Fbutton>\n  <\u002Fnav>\n\n  <main style=\"max-width:1240px; margin:0 auto; padding:30px 36px 0;\">\n\n    <!-- ========== OVERVIEW ========== -->\n    <sc-if value=\"{{ isOverview }}\" hint-placeholder-val=\"{{ true }}\">\n    <section style=\"animation:fadeUp .4s ease;\">\n      <div style=\"display:grid; grid-template-columns:1.55fr 1fr; gap:26px; align-items:start;\">\n        <div style=\"background:#FBF9F4; border:1px solid #E4DDCF; border-radius:6px; padding:28px 30px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; letter-spacing:.14em; text-transform:uppercase; color:#9A6A2F; margin-bottom:14px;\">Pertanyaan Integratif<\u002Fdiv>\n          <p style=\"font-family:'Spectral',serif; font-size:21px; line-height:1.5; margin:0 0 22px; color:#26221B;\">Bagaimana objek cagar budaya berperan dalam <em>ekosistem pengalaman publik<\u002Fem> — ketika hasil topik, sentimen, dan struktur jaringan dibaca bersama sebagai satu kesatuan?<\u002Fp>\n          <p style=\"font-size:15px; line-height:1.65; color:#5C5346; margin:0;\">Setiap objek dibaca lewat <strong style=\"color:#1E1B16;\">tiga dimensi<\u002Fstrong> sekaligus. Topik menjawab <em>apa<\u002Fem> yang dibicarakan, sentimen menjawab <em>bagaimana<\u002Fem> objek dinilai, dan SNA menjawab <em>bagaimana<\u002Fem> objek terhubung dengan objek lain. Tidak satu pun metode cukup berdiri sendiri.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:12px;\">\n          <sc-for list=\"{{ dims }}\" as=\"d\" hint-placeholder-count=\"3\">\n          <div style=\"background:#FBF9F4; border:1px solid #E4DDCF; border-left:3px solid {{ d.color }}; border-radius:5px; padding:15px 17px;\">\n            <div style=\"display:flex; align-items:baseline; justify-content:space-between; gap:10px;\">\n              <div style=\"font-family:'Spectral',serif; font-weight:600; font-size:16px;\">{{ d.title }}<\u002Fdiv>\n              <div style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; color:{{ d.color }};\">{{ d.method }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font-size:13px; line-height:1.5; color:#6A6051; margin-top:5px;\">{{ d.desc }}<\u002Fdiv>\n          <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- STAT STRIP -->\n      <div style=\"display:grid; grid-template-columns:repeat(5,1fr); gap:14px; margin-top:24px;\">\n        <sc-for list=\"{{ stats }}\" as=\"s\" hint-placeholder-count=\"5\">\n        <div style=\"background:#FBF9F4; border:1px solid #E4DDCF; border-radius:6px; padding:18px 18px;\">\n          <div style=\"font-family:'Spectral',serif; font-weight:600; font-size:30px; line-height:1; letter-spacing:-.02em;\">{{ s.val }}<\u002Fdiv>\n          <div style=\"font-size:12px; color:#7A7060; margin-top:7px; line-height:1.35;\">{{ s.label }}<\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- KEY INSIGHT + FINDINGS -->\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:26px; margin-top:30px; align-items:start;\">\n        <div style=\"background:#26221B; color:#F2ECE0; border-radius:6px; padding:28px 30px;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; letter-spacing:.14em; text-transform:uppercase; color:#D8A24E; margin-bottom:14px;\">Temuan Inti<\u002Fdiv>\n          <p style=\"font-family:'Spectral',serif; font-size:23px; line-height:1.42; margin:0 0 16px; font-weight:500;\">Sentralitas jaringan tidak selalu sejalan dengan kepuasan pengunjung.<\u002Fp>\n          <p style=\"font-size:14px; line-height:1.65; color:#C9C0B0; margin:0;\">Objek yang paling strategis dalam jaringan — seperti De Javasche Bank atau Masjid Sunan Ampel — belum tentu objek yang paling disukai. Sebaliknya, objek dengan sentimen sangat positif sering justru periferal. Pengelolaan cagar budaya karenanya perlu membaca posisi struktural, bukan sekadar tingkat kepuasan.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; letter-spacing:.14em; text-transform:uppercase; color:#9A6A2F; margin-bottom:14px;\">Apa yang Ditemukan Integrasi<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:11px;\">\n            <sc-for list=\"{{ findings }}\" as=\"f\" hint-placeholder-count=\"4\">\n            <div style=\"display:flex; gap:13px; align-items:flex-start;\">\n              <div style=\"flex:none; width:23px; height:23px; border-radius:50%; background:#EDE4D3; color:#9A6A2F; font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:500; display:flex; align-items:center; justify-content:center; margin-top:1px;\">{{ f.n }}<\u002Fdiv>\n              <div style=\"font-size:14px; line-height:1.55; color:#46402F;\">{{ f.text }}<\u002Fdiv>\n            <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n    <\u002Fsc-if>\n\n    <!-- ========== JARINGAN ========== -->\n    <sc-if value=\"{{ isJaringan }}\" hint-placeholder-val=\"{{ true }}\">\n    <section style=\"animation:fadeUp .4s ease;\">\n      <!-- controls -->\n      <div style=\"display:flex; justify-content:space-between; gap:20px; flex-wrap:wrap; align-items:flex-end; margin-bottom:16px;\">\n        <div>\n          <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.13em; text-transform:uppercase; color:#9A6A2F; margin-bottom:8px;\">Warnai node berdasarkan dimensi<\u002Fdiv>\n          <div style=\"display:inline-flex; background:#E6DECE; border-radius:7px; padding:3px;\">\n            <button onclick=\"{{ setDimStruktural }}\" style=\"{{ dimStyle.struktural }}\">Struktural · SNA<\u002Fbutton>\n            <button onclick=\"{{ setDimAfektif }}\" style=\"{{ dimStyle.afektif }}\">Afektif · Sentimen<\u002Fbutton>\n            <button onclick=\"{{ setDimDiskursif }}\" style=\"{{ dimStyle.diskursif }}\">Diskursif · Topik<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:18px; align-items:flex-end; flex-wrap:wrap;\">\n          <div>\n            <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.13em; text-transform:uppercase; color:#9A6A2F; margin-bottom:8px;\">Filter komunitas<\u002Fdiv>\n            <div style=\"display:flex; gap:6px;\">\n              <sc-for list=\"{{ komChips }}\" as=\"k\" hint-placeholder-count=\"4\">\n              <button onclick=\"{{ k.toggle }}\" style=\"{{ k.style }}\">{{ k.label }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.13em; text-transform:uppercase; color:#9A6A2F; margin-bottom:8px;\">Filter peran<\u002Fdiv>\n            <select onchange=\"{{ onPeranChange }}\" value=\"{{ peranSel }}\" style=\"font-family:'IBM Plex Sans',sans-serif; font-size:13px; padding:8px 12px; border:1px solid #D6CDBC; border-radius:6px; background:#FBF9F4; color:#1E1B16; cursor:pointer; min-width:200px;\">\n              <sc-for list=\"{{ peranOptions }}\" as=\"p\" hint-placeholder-count=\"8\">\n              <option value=\"{{ p.value }}\">{{ p.label }}<\u002Foption>\n              <\u002Fsc-for>\n            <\u002Fselect>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:grid; grid-template-columns:1fr 320px; gap:20px; align-items:start;\">\n        <!-- GRAPH -->\n        <div style=\"background:#FBF9F4; border:1px solid #E4DDCF; border-radius:8px; padding:8px 8px 0; position:relative; overflow:hidden;\">\n          <svg ref=\"{{ svgRef }}\" viewBox=\"0 0 960 620\" onpointermove=\"{{ onPointerMove }}\" onpointerup=\"{{ onPointerUp }}\" onpointerleave=\"{{ onPointerUp }}\" style=\"width:100%; height:auto; display:block; touch-action:none;\">\n            <sc-for list=\"{{ edges }}\" as=\"e\" hint-placeholder-count=\"20\">\n            <line x1=\"{{ e.x1 }}\" y1=\"{{ e.y1 }}\" x2=\"{{ e.x2 }}\" y2=\"{{ e.y2 }}\" stroke=\"#B8AE99\" stroke-width=\"{{ e.w }}\" stroke-opacity=\"{{ e.op }}\" stroke-linecap=\"round\"><\u002Fline>\n            <\u002Fsc-for>\n            <sc-for list=\"{{ nodes }}\" as=\"n\" hint-placeholder-count=\"27\">\n            <g opacity=\"{{ n.op }}\">\n              <circle class=\"node-c\" cx=\"{{ n.x }}\" cy=\"{{ n.y }}\" r=\"{{ n.r }}\" fill=\"{{ n.fill }}\" stroke=\"{{ n.stroke }}\" stroke-width=\"{{ n.sw }}\" onpointerdown=\"{{ n.onDown }}\"><\u002Fcircle>\n              <text x=\"{{ n.x }}\" y=\"{{ n.ly }}\" text-anchor=\"middle\" font-family=\"IBM Plex Sans, sans-serif\" font-size=\"11\" font-weight=\"{{ n.lw }}\" fill=\"#3A352B\" style=\"pointer-events:none; opacity:{{ n.lop }};\">{{ n.short }}<\u002Ftext>\n            <\u002Fg>\n            <\u002Fsc-for>\n          <\u002Fsvg>\n          <div style=\"border-top:1px solid #ECE4D6; margin-top:4px; padding:10px 8px; font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:#9A9081; line-height:1.5;\">Ukuran node = weighted degree · ketebalan cincin = betweenness · klik untuk membuka profil, seret untuk menata.<\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- SIDE: legend OR detail -->\n        <div style=\"position:sticky; top:14px;\">\n          <sc-if value=\"{{ hasSelected }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:#FBF9F4; border:1px solid #E4DDCF; border-radius:8px; overflow:hidden; animation:fadeUp .25s ease;\">\n            <div style=\"background:{{ sel.komColor }}; padding:16px 18px; color:#fff;\">\n              <div style=\"display:flex; justify-content:space-between; align-items:flex-start; gap:8px;\">\n                <div style=\"font-family:'Spectral',serif; font-weight:600; font-size:18px; line-height:1.2;\">{{ sel.nama }}<\u002Fdiv>\n                <button onclick=\"{{ clearSel }}\" style=\"flex:none; background:rgba(255,255,255,.22); border:none; color:#fff; width:24px; height:24px; border-radius:50%; cursor:pointer; font-size:14px; line-height:1;\">✕<\u002Fbutton>\n              <\u002Fdiv>\n              <div style=\"font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:.06em; margin-top:6px; opacity:.92;\">{{ sel.komNama }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"padding:16px 18px;\">\n              <div style=\"display:inline-block; font-family:'IBM Plex Mono',monospace; font-size:11px; padding:4px 10px; border-radius:20px; background:#EDE4D3; color:#7A4E16; margin-bottom:12px;\">{{ sel.peran }}<\u002Fdiv>\n              <div style=\"font-size:12.5px; line-height:1.5; color:#6A6051; margin-bottom:16px;\">{{ sel.peranDef }}<\u002Fdiv>\n\n              <div style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:#9A6A2F; margin-bottom:6px;\">Diskursif · Topik<\u002Fdiv>\n              <div style=\"font-size:13.5px; font-weight:600; line-height:1.35;\">{{ sel.topikUtama }}<\u002Fdiv>\n              <div style=\"font-size:12px; color:#7A7060; margin-top:2px;\">Pendamping: {{ sel.topikPendamping }}<\u002Fdiv>\n\n              <div style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:#9A6A2F; margin:16px 0 8px;\">Afektif · Sentimen<\u002Fdiv>\n              <div style=\"display:flex; height:10px; border-radius:5px; overflow:hidden; background:#EAE2D4;\">\n                <div style=\"width:{{ sel.posW }}; background:#1E865A;\"><\u002Fdiv>\n                <div style=\"width:{{ sel.neuW }}; background:#B8AE9E;\"><\u002Fdiv>\n                <div style=\"width:{{ sel.negW }}; background:#C0492F;\"><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex; justify-content:space-between; font-family:'IBM Plex Mono',monospace; font-size:11px; margin-top:7px; color:#5C5346;\">\n                <span style=\"color:#1E865A;\">▲ {{ sel.pos }}% positif<\u002Fspan>\n                <span>{{ sel.neu }}% netral<\u002Fspan>\n                <span style=\"color:#C0492F;\">▼ {{ sel.neg }}% negatif<\u002Fspan>\n              <\u002Fdiv>\n\n              <div style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:#9A6A2F; margin:16px 0 8px;\">Struktural · SNA<\u002Fdiv>\n              <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:9px;\">\n                <div style=\"background:#F2ECE0; border-radius:5px; padding:9px 11px;\">\n                  <div style=\"font-family:'Spectral',serif; font-weight:600; font-size:20px;\">{{ sel.wd }}<\u002Fdiv>\n                  <div style=\"font-size:10.5px; color:#7A7060;\">Weighted degree<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"background:#F2ECE0; border-radius:5px; padding:9px 11px;\">\n                  <div style=\"font-family:'Spectral',serif; font-weight:600; font-size:20px;\">{{ sel.bc }}<\u002Fdiv>\n                  <div style=\"font-size:10.5px; color:#7A7060;\">Betweenness<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex; justify-content:space-between; font-family:'IBM Plex Mono',monospace; font-size:11px; margin-top:12px; color:#8A8070; padding-top:12px; border-top:1px solid #E8E0D1;\">\n                <span>{{ sel.reviews }} reviews<\u002Fspan>\n                <span>{{ sel.teks }} ulasan teks<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ noSelected }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"background:#FBF9F4; border:1px solid #E4DDCF; border-radius:8px; padding:18px;\">\n            <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#9A6A2F; margin-bottom:14px;\">{{ legendTitle }}<\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; gap:11px;\">\n              <sc-for list=\"{{ legend }}\" as=\"l\" hint-placeholder-count=\"4\">\n              <div style=\"display:flex; align-items:center; gap:11px;\">\n                <div style=\"flex:none; width:15px; height:15px; border-radius:4px; background:{{ l.color }};\"><\u002Fdiv>\n                <div style=\"font-size:13px; line-height:1.3; color:#46402F;\">{{ l.label }}<\u002Fdiv>\n              <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"margin-top:18px; padding-top:16px; border-top:1px solid #E8E0D1; font-size:12.5px; line-height:1.55; color:#7A7060;\">{{ legendNote }}<\u002Fdiv>\n            <div style=\"margin-top:14px; font-size:12px; color:#9A9081; font-style:italic;\">Klik sebuah node untuk membuka profil integratif objek.<\u002Fdiv>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n    <\u002Fsc-if>\n\n    <!-- ========== TOPIK & SENTIMEN ========== -->\n    <sc-if value=\"{{ isTopik }}\" hint-placeholder-val=\"{{ true }}\">\n    <section style=\"animation:fadeUp .4s ease;\">\n      <!-- TOPIC BARS -->\n      <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; letter-spacing:.13em; text-transform:uppercase; color:#9A6A2F; margin-bottom:5px;\">16 Topik Final · BERTopic<\u002Fdiv>\n      <p style=\"font-size:13.5px; line-height:1.55; color:#6A6051; margin:0 0 18px; max-width:880px;\">Distribusi 3.263 ulasan terklasifikasi. Warna menandai rumpun tema. Topik fasilitas &amp; operasional adalah sumber keluhan utama meski objek tetap dihargai.<\u002Fp>\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:14px 40px;\">\n        <sc-for list=\"{{ topikBars }}\" as=\"t\" hint-placeholder-count=\"16\">\n        <div>\n          <div style=\"display:flex; justify-content:space-between; align-items:baseline; gap:8px; margin-bottom:3px;\">\n            <div style=\"font-size:13px; font-weight:500; line-height:1.25;\">{{ t.label }}<\u002Fdiv>\n            <div style=\"flex:none; font-family:'IBM Plex Mono',monospace; font-size:11px; color:#8A8070;\">{{ t.n }} · {{ t.pct }}%<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"height:8px; background:#E8E0D1; border-radius:4px; overflow:hidden;\">\n            <div style=\"width:{{ t.w }}; height:100%; background:{{ t.color }}; border-radius:4px;\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-wrap:wrap; gap:14px; margin-top:18px; padding-top:16px; border-top:1px solid #E4DDCF;\">\n        <sc-for list=\"{{ rumpunLegend }}\" as=\"r\" hint-placeholder-count=\"5\">\n        <div style=\"display:flex; align-items:center; gap:7px;\">\n          <div style=\"width:11px; height:11px; border-radius:3px; background:{{ r.color }};\"><\u002Fdiv>\n          <div style=\"font-size:11.5px; color:#6A6051;\">{{ r.label }}<\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- QUADRANT SCATTER -->\n      <div style=\"margin-top:34px;\">\n        <div style=\"display:flex; justify-content:space-between; align-items:flex-end; gap:20px; flex-wrap:wrap; margin-bottom:14px;\">\n          <div style=\"max-width:680px;\">\n            <h2 style=\"font-family:'Spectral',serif; font-weight:600; font-size:22px; margin:0 0 6px;\">Posisi Objek dalam Ekosistem: Sentralitas × Sentimen<\u002Fh2>\n            <p style=\"font-size:13.5px; line-height:1.55; color:#6A6051; margin:0;\">Sumbu-X = posisi struktural dalam jaringan ko-reviewer, sumbu-Y = keseimbangan sentimen (% positif − % negatif). Garis putus-putus = median; objek di kanan-atas <strong style=\"color:#1E865A;\">strategis &amp; disepakati<\u002Fstrong>, di kanan-bawah <strong style=\"color:#C0492F;\">sentral tapi bermasalah<\u002Fstrong>.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"display:flex; gap:18px; font-family:'IBM Plex Mono',monospace; font-size:11px; color:#7A7060;\">\n            <div style=\"display:flex; align-items:center; gap:7px;\"><svg width=\"16\" height=\"16\"><polygon points=\"8,2 10,6.5 14.5,6.5 11,9.5 12.5,14 8,11.2 3.5,14 5,9.5 1.5,6.5 6,6.5\" fill=\"#7A7060\"><\u002Fpolygon><\u002Fsvg> bridge node<\u002Fdiv>\n            <div style=\"display:flex; align-items:center; gap:7px;\"><span style=\"display:inline-block; width:13px; height:13px; border-radius:50%; background:#B8AE99;\"><\u002Fspan> ukuran = betweenness<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:#FBF9F4; border:1px solid #E4DDCF; border-radius:8px; padding:10px;\">\n          <svg viewBox=\"0 0 1160 600\" style=\"width:100%; height:auto; display:block;\">\n            <!-- quadrant zones -->\n            <rect x=\"{{ quad.mx }}\" y=\"{{ quad.y0 }}\" width=\"{{ quad.zoneW }}\" height=\"{{ quad.zoneTopH }}\" fill=\"#1E865A\" fill-opacity=\"0.07\"><\u002Frect>\n            <rect x=\"{{ quad.mx }}\" y=\"{{ quad.my }}\" width=\"{{ quad.zoneW }}\" height=\"{{ quad.zoneBotH }}\" fill=\"#C0492F\" fill-opacity=\"0.07\"><\u002Frect>\n            <!-- grid ticks -->\n            <sc-for list=\"{{ quad.xticks }}\" as=\"t\" hint-placeholder-count=\"8\">\n            <line x1=\"{{ t.x }}\" y1=\"{{ quad.y0 }}\" x2=\"{{ t.x }}\" y2=\"{{ quad.y1 }}\" stroke=\"#EFE7D8\" stroke-width=\"1\"><\u002Fline>\n            <text x=\"{{ t.x }}\" y=\"{{ quad.xlabY }}\" text-anchor=\"middle\" font-family=\"IBM Plex Mono, monospace\" font-size=\"10\" fill=\"#A89E8C\">{{ t.v }}<\u002Ftext>\n            <\u002Fsc-for>\n            <sc-for list=\"{{ quad.yticks }}\" as=\"t\" hint-placeholder-count=\"7\">\n            <line x1=\"{{ quad.x0 }}\" y1=\"{{ t.y }}\" x2=\"{{ quad.x1 }}\" y2=\"{{ t.y }}\" stroke=\"#EFE7D8\" stroke-width=\"1\"><\u002Fline>\n            <text x=\"{{ incin tebal = betweenness tinggi (simpul penghubung).';\n    }\n\n    // selected detail\n    let sel = null;\n    if (st.selected) {\n      const o = this.OBJ.find(x => x.nama === st.selected);\n      if (o) {\n        const neu = Math.max(0, +(100 - o.pos - o.neg).toFixed(1));\n        sel = {\n          nama: o.nama, peran: o.peran, peranDef: this.PERAN_DEF[o.peran],\n          komColor: this.C[o.komunitas], komNama: this.KOM[o.komunitas].nama,\n          topikUtama: o.topikUtama, topikPendamping: o.topikPendamping,\n          pos: o.pos, neg: o.neg, neu,\n          posW: o.pos + '%', neuW: neu + '%', negW: o.neg + '%',\n          wd: o.wd, bc: o.bc.toFixed(3), reviews: o.reviews, teks: o.teks,\n        };\n      }\n    }\n\n    // komChips\n    const komChips = this.KOM.map(k => {\n      const on = st.kom.indexOf(k.id) >= 0;\n      return {\n        label: k.short, toggle: () => this.toggleKom(k.id),\n        style: `font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:500; padding:7px 12px; border-radius:6px; cursor:pointer; border:1px solid ${on ? this.C[k.id] : '#D6CDBC'}; background:${on ? this.C[k.id] : '#FBF9F4'}; color:${on ? '#fff' : '#9A9081'};`,\n      };\n    });\n    const peranOptions = [{ value: 'all', label: 'Semua peran' }].concat(this._peranList.map(p => ({ value: p, label: p })));\n\n    // topik bars\n    const maxN = 487;\n    const topikBars = this.TOPIK.map(t => ({\n      label: t[1], n: t[2].toLocaleString('id-ID'), pct: t[3].toString().replace('.', ','),\n      w: (t[2] / maxN * 100).toFixed(1) + '%', color: this.RUMPUN[t[4]],\n    }));\n    const rumpunLegend = Object.keys(this.RUMPUN).map(k => ({ color: this.RUMPUN[k], label: k }));\n\n    // ===== Quadrant scatter: Sentralitas × Sentiment balance =====\n    const QX0 = 92, QX1 = 1118, QY0 = 44, QY1 = 540;\n    const WDMAX = 175, BMIN = 18, BMAX = 88;\n    const QX = (wd) => QX0 + (wd / WDMAX) * (QX1 - QX0);\n    const QY = (b) => QY1 - ((b - BMIN) / (BMAX - BMIN)) * (QY1 - QY0);\n    const bal = (o) => +(o.pos - o.neg).toFixed(1);\n    const med = (arr) => { const a = arr.slice().sort((x, y) => x - y); const n = a.length; return n % 2 ? a[(n - 1) / 2] : (a[n / 2 - 1] + a[n / 2]) / 2; };\n    const wdMed = med(this.OBJ.map(o => o.wd));\n    const balMed = med(this.OBJ.map(bal));\n    const mx = QX(wdMed), my = QY(balMed);\n    const bcMax = Math.max.apply(null, this.OBJ.map(o => o.bc));\n    const rOf = (bc) => 7 + Math.sqrt(bc / bcMax) * 21;\n\n    const quadMarkers = this.OBJ.map(o => {\n      const isSel = st.selected === o.nama;\n      const isBridge = o.peran === 'Bridge Heritage Node';\n      const x = QX(o.wd), y = QY(bal(o)), r = rOf(o.bc);\n      let star = '';\n      if (isBridge) {\n        const R = r + 3.5, r2 = R * 0.45; let pts = '';\n        for (let i = 0; i < 10; i++) { const ang = -Math.PI / 2 + i * Math.PI / 5; const rad = i % 2 ? r2 : R; pts += (x + rad * Math.cos(ang)).toFixed(1) + ',' + (y + rad * Math.sin(ang)).toFixed(1) + ' '; }\n        star = pts.trim();\n      }\n      return {\n        nama: o.nama, x: x.toFixed(1), y: y.toFixed(1), r: r.toFixed(1),\n        isBridge, star, isCircle: !isBridge,\n        fill: this.C[o.komunitas], fo: isSel ? 1 : 0.82,\n        stroke: isSel ? '#1E1B16' : '#FBF9F4', sw: isSel ? 2.6 : 1.2,\n        onClick: () => this.select(o.nama),\n      };\n    });\n\n    // greedy label anti-overlap (place above marker, push up on collision)\n    const lab = this.OBJ.map(o => ({ o, x: QX(o.wd), y: QY(bal(o)), r: rOf(o.bc) })).sort((a, b) => a.x - b.x);\n    const placed = [];\n    const quadLabels = lab.map(it => {\n      let ly = it.y - it.r - 4;\n      let guard = 0;\n      while (guard++ < 40 && placed.some(p => Math.abs(p.x - it.x) < 78 && Math.abs(p.ly - ly) < 11)) ly -= 11;\n      if (ly < QY0 + 9) ly = it.y + it.r + 11;\n      placed.push({ x: it.x, ly });\n      const isSel = st.selected === it.o.nama;\n      let anchor = 'middle', tx = it.x;\n      if (it.x < QX0 + 60) { anchor = 'start'; tx = it.x - it.r; }\n      else if (it.x > QX1 - 60) { anchor = 'end'; tx = it.x + it.r; }\n      return { text: it.o.short, x: tx.toFixed(1), y: ly.toFixed(1), anchor, weight: isSel ? 700 : 500, fill: isSel ? '#1E1B16' : '#5A5346' };\n    });\n\n    const xticks = [0, 25, 50, 75, 100, 125, 150, 175].map(v => ({ v, x: QX(v).toFixed(1) }));\n    const yticks = [20, 30, 40, 50, 60, 70, 80].map(v => ({ v, y: QY(v).toFixed(1), yt: (QY(v) + 3.5).toFixed(1) }));\n\n    const quad = {\n      markers: quadMarkers, labels: quadLabels, xticks, yticks,\n      mx: mx.toFixed(1), my: my.toFixed(1),\n      x0: QX0, x1: QX1, y0: QY0, y1: QY1,\n      zoneW: (QX1 - mx).toFixed(1), zoneTopH: (my - QY0).toFixed(1), zoneBotH: (QY1 - my).toFixed(1),\n      xlabY: (QY1 + 16).toFixed(1), ylabX: (QX0 - 6).toFixed(1), midY: ((QY0 + QY1) / 2).toFixed(1),\n      wdMed, balMed: balMed.toFixed(1),\n    };\n    const komLegendFull = this.KOM.map(k => ({ color: this.C[k.id], label: k.nama }));\n\n    return {\n      isOverview: st.tab === 'overview', isJaringan: st.tab === 'jaringan',\n      isTopik: st.tab === 'topik', isPrioritas: st.tab === 'prioritas',\n      tabStyle: { overview: tabStyleFor('overview'), jaringan: tabStyleFor('jaringan'), topik: tabStyleFor('topik'), prioritas: tabStyleFor('prioritas') },\n      goOverview: () => this.go('overview'), goJaringan: () => this.go('jaringan'), goTopik: () => this.go('topik'), goPrioritas: () => this.go('prioritas'),\n      dimStyle: { struktural: dimStyleFor('struktural'), afektif: dimStyleFor('afektif'), diskursif: dimStyleFor('diskursif') },\n      setDimStruktural: () => this.setDim('struktural'), setDimAfektif: () => this.setDim('afektif'), setDimDiskursif: () => this.setDim('diskursif'),\n      nodes, edges, svgRef: (el) => { this.svgEl = el; },\n      onPointerMove: (e) => this.onMove(e), onPointerUp: () => this.endDrag(),\n      legend, legendTitle, legendNote,\n      hasSelected: !!sel, noSelected: !sel, sel, clearSel: () => this.clear(),\n      komChips, peranOptions, peranSel: st.peranSel, onPeranChange: (e) => this.setState({ peranSel: e.target.value }),\n      topikBars, rumpunLegend,\n      topikBars, rumpunLegend, quad, komLegendFull,\n      dims: [\n        { title: 'Diskursif', method: 'Topic Modeling', color: '#2C66C9', desc: 'Apa yang dibicarakan — 16 topik dari BERTopic.' },\n        { title: 'Afektif', method: 'Sentiment', color: '#1E865A', desc: 'Bagaimana dinilai — positif, netral, negatif (XLM-T + XGBoost).' },\n        { title: 'Struktural', method: 'SNA', color: '#7E4FC0', desc: 'Bagaimana terhubung — jaringan ko-reviewer & komunitas Louvain.' },\n      ],\n      stats: [\n        { val: '11.030', label: 'data reviews Google Maps' },\n        { val: '4.054', label: 'ulasan teks valid' },\n        { val: '27', label: 'objek cagar budaya' },\n        { val: '16', label: 'topik final' },\n        { val: '4', label: 'komunitas ko-reviewer' },\n      ],\n      findings: [\n        { n: '1', text: 'Sebagian objek sudah kuat — sentimen positif tinggi & identitas topik jelas (mis. Museum Pendidikan, Hotel Majapahit, Zangrandi).' },\n        { n: '2', text: 'Objek strategis seperti De Javasche Bank & Masjid Sunan Ampel menghubungkan banyak komunitas, tetapi pengalamannya belum maksimal.' },\n        { n: '3', text: 'Keluhan parkir, jam operasional, & fasilitas muncul lintas komunitas — isu praktis, bukan penolakan nilai sejarah.' },\n        { n: '4', text: 'Cagar budaya Surabaya membentuk satu ekosistem pengalaman, bukan kumpulan situs yang terpisah.' },\n      ],\n      prioritas: this.PRIORITAS,\n      strategi: [\n        { n: '1', title: 'Pertahankan objek positif', desc: 'Jadikan anchor promosi & ikon tematik dalam rute heritage.' },\n        { n: '2', title: 'Perkuat objek strategis', desc: 'Anchor & bridge — perbaikannya berdampak lintas komunitas.' },\n        { n: '3', title: 'Perbaiki isu operasional', desc: 'Parkir, akses, fasilitas, jam kunjungan agar pengalaman naik.' },\n      ],\n      peranLegend: this._peranList.map(p => ({ name: p, def: this.PERAN_DEF[p] })),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"Dashboard Integratif.dc"}
